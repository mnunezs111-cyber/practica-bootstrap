<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Trabajando con Formulario HTML5</h1>
    <form action="#" method="">
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" placeholder="escribe tu nombre aquí">
        </div>
        <div>
            <label for="edad">Edad</label>
            <input type="number" name="edad" id="edad">
        </div>
        <div>
            <label for="password">Password</label>
            <input type="password" name="password" id="password">
        </div> 
        <div>
            <label for="fecha-nacimiento">Fecha de nacimiento</label>
            <input type="date" name="fecha-nacimiento" id="fecha-nacimiento">
        </div>
        <div>
            <label for="color">Color</label>
            <input type="color" name="color" id="color">
        </div>
        <div>
            <label for="mensaje">Mensaje</label>
            <textarea name="mensaje" id="mensaje" rows="10" cols="50"></textarea>
        </div>
        <div>
            <label for="Estilo de fuente"></label>
            <input type="radio" name="fuente" id="bold">
            <label for="bold"><strong>Bold</strong></label>
            <input type="radio" name="fuente" id="regular" value="regular">
            <label for="regular">regular</label>
        </div>
        <div>
            <label for="elige color"></label>
            <input type="radio" name="color" id="azul" value="azul">
            <label for="azul"><strong>Azul</strong></label>
            <input type="radio" name="color" id="rojo" value="rojo">
            <label for="rojo"></label>
        </div>
        <div>
            <label for="Lenguaje que manejas"></label>
            <input type="checkbox" name="lenguajes" id="html">
            <label for="html">HTML5</label>
            <input type="checkbox" name="lenguajes" id="css">
            <label for="css">CSS3</label>
            <input type="checkbox" name="lenguajes" id="js">
            <label for="js">Javascript</label>
        </div> 
        <div>
            <label for="ciudades">Ciudad</label>
            <select name="ciudades" id="ciudades">
                <option value="Temuco">Temuco</option>
                <option value="Viña del Mar">Viña del Mar</option>
                <option value="Concepción">Concepción</option>
            </select>
        </div>
        <div>
            <button type="submit">Enviar</button>
            <input type="submit" value="Enviar">
        </div> 
    </form>
</body>
</html>
